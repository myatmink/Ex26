<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling Practice</title>

<style>
    body {
            font-family: Arial, sans-serif;
                    background-color: #f5f5f5;
                            text-align: center;
                                }

                                    .container {
                                            display: flex;
                                                    justify-content: space-around;
                                                            align-items: center;
                                                                    margin-top: 50px;
                                                                        }

                                                                            /* Common style */
                                                                                .img-box {
                                                                                        width: 33%;
                                                                                            }

                                                                                                .img-box img {
                                                                                                        width: 100%;
                                                                                                            }

                                                                                                                /* Left image (rounded corners, no distortion) */
                                                                                                                    .rounded img {
                                                                                                                            border-radius: 18px;
                                                                                                                                    object-fit: cover; /* keeps ratio */
                                                                                                                                            height: 300px;
                                                                                                                                                }

                                                                                                                                                    /* Center image (circle 150px) */
                                                                                                                                                        .circle img {
                                                                                                                                                                width: 150px;
                                                                                                                                                                        height: 150px;
                                                                                                                                                                                border-radius: 50%;
                                                                                                                                                                                        object-fit: cover;
                                                                                                                                                                                                border: 3px solid #ccc;
                                                                                                                                                                                                    }

                                                                                                                                                                                                        /* Right image (distortion) */
                                                                                                                                                                                                            .distort img {
                                                                                                                                                                                                                    width: 100%;
                                                                                                                                                                                                                            height: 300px;
                                                                                                                                                                                                                                    object-fit: fill; /* causes distortion */
                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                        </style>

                                                                                                                                                                                                                                        </head>

                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                        <h2>CSS Image Styling Practice</h2>

                                                                                                                                                                                                                                        <div class="container">

                                                                                                                                                                                                                                            <!-- Left -->
                                                                                                                                                                                                                                                <div class="img-box rounded">
                                                                                                                                                                                                                                                        <img src="https://picsum.photos/id/1011/600/400" alt="Left Image">
                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                <!-- Center -->
                                                                                                                                                                                                                                                                    <div class="img-box circle">
                                                                                                                                                                                                                                                                            <img src="https://picsum.photos/id/1015/600/400" alt="Circle Image">
                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                    <!-- Right -->
                                                                                                                                                                                                                                                                                        <div class="img-box distort">
                                                                                                                                                                                                                                                                                                <img src="https://picsum.photos/id/1011/600/400" alt="Right Image">
                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                    </html>
